name: Documentation

on:
  push:
    branches:
      - main

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'

      - name: Cache packages
        uses: julia-actions/cache@v1

      - name: Instantiate docs environment
        run: julia --project=docs -e 'using Pkg; Pkg.develop(path=joinpath(@__DIR__, ".")); Pkg.instantiate()'

      - name: Build docs
        run: julia --project=docs docs/make.jl